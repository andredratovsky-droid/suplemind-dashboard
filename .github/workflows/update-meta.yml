name: Update Meta Ads Data

on:
  schedule:
    # A cada 25 min, offset diferente do Bling
    - cron: '13,38,3 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de coleta'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - full
          - incremental

permissions:
  contents: write

concurrency:
  group: update-meta-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determinar modo de coleta
        id: mode
        run: |
          HOUR_UTC=$(date -u +%H)
          MANUAL_MODE="${{ github.event.inputs.mode }}"

          if [ "$MANUAL_MODE" = "full" ] || [ "$MANUAL_MODE" = "incremental" ]; then
            MODE="$MANUAL_MODE"
          elif [ "$HOUR_UTC" = "11" ] || [ "$HOUR_UTC" = "23" ]; then
            MODE="full"
          else
            MODE="incremental"
          fi

          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "Modo: $MODE"

      - name: Executar coletor Meta Ads
        env:
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_AD_ACCOUNT_IDS: ${{ secrets.META_AD_ACCOUNT_IDS }}
          COLLECT_MODE: ${{ steps.mode.outputs.mode }}
        run: node collect-meta.js

      - name: Commit e push dos dados Meta (com pull+retry)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            echo "=== Tentativa $attempt ==="

            git add data/meta.json 2>/dev/null || true
            git add data/meta_creatives_cache.json 2>/dev/null || true

            if git diff --staged --quiet; then
              echo "Nenhuma mudanca nos dados Meta"
              exit 0
            fi

            MODE="${{ steps.mode.outputs.mode }}"
            git commit -m "chore: atualizar dados Meta Ads ($MODE) [skip ci]" || echo "Nada a commitar"

            echo "Puxando mudancas remotas..."
            if git pull --rebase origin main; then
              if git push origin main; then
                echo "Push OK na tentativa $attempt"
                exit 0
              else
                sleep 5
              fi
            else
              git rebase --abort 2>/dev/null || true
              sleep 5
            fi
          done

          echo "❌ Falha ao commitar após 3 tentativas"
          exit 1
