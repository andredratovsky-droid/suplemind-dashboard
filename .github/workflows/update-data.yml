name: Update Bling Data

on:
  schedule:
    # A cada 25 min. Usa offset :07/:32/:57 para evitar picos do scheduler do GitHub.
    - cron: '7,32,57 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de coleta'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - full
          - incremental

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determinar modo de coleta
        id: mode
        run: |
          # Hora atual em UTC
          HOUR_UTC=$(date -u +%H)
          # Modo manual sobrescreve
          MANUAL_MODE="${{ github.event.inputs.mode }}"

          if [ "$MANUAL_MODE" = "full" ] || [ "$MANUAL_MODE" = "incremental" ]; then
            MODE="$MANUAL_MODE"
            echo "Modo manual: $MODE"
          elif [ "$HOUR_UTC" = "11" ] || [ "$HOUR_UTC" = "23" ]; then
            # 08:00 e 20:00 BRT = 11:00 e 23:00 UTC → coleta completa
            MODE="full"
            echo "Janela de coleta completa (hora $HOUR_UTC UTC)"
          else
            MODE="incremental"
            echo "Coleta incremental (hora $HOUR_UTC UTC)"
          fi

          echo "mode=$MODE" >> $GITHUB_OUTPUT

      - name: Executar coletor Bling
        id: collect
        env:
          BLING_CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          BLING_CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          BLING_REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          COLLECT_MODE: ${{ steps.mode.outputs.mode }}
        run: node collect.js

      - name: Atualizar BLING_REFRESH_TOKEN no GitHub Secrets
        if: always() && hashFiles('.bling_refresh_token') != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_TOKEN=$(cat .bling_refresh_token)
          if [ -n "$NEW_TOKEN" ]; then
            echo "Atualizando BLING_REFRESH_TOKEN..."
            echo "$NEW_TOKEN" | gh secret set BLING_REFRESH_TOKEN --repo ${{ github.repository }}
            echo "✅ Token atualizado no Secrets"
          else
            echo "⚠️  Arquivo .bling_refresh_token vazio — nada a atualizar"
          fi
          rm -f .bling_refresh_token

      - name: Commit e push dos dados atualizados
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bling.json
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos dados — skip commit"
          else
            MODE="${{ steps.mode.outputs.mode }}"
            git commit -m "chore: atualizar dados Bling ($MODE) [skip ci]"
            git push
          fi
