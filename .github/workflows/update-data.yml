name: Update Bling Data

on:
  schedule:
    - cron: '7,32,57 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de coleta'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - full
          - incremental

permissions:
  contents: write

# Evita execuções concorrentes do mesmo workflow (fila em vez de paralelo)
concurrency:
  group: update-bling-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determinar modo de coleta
        id: mode
        run: |
          HOUR_UTC=$(date -u +%H)
          MANUAL_MODE="${{ github.event.inputs.mode }}"

          if [ "$MANUAL_MODE" = "full" ] || [ "$MANUAL_MODE" = "incremental" ]; then
            MODE="$MANUAL_MODE"
          elif [ "$HOUR_UTC" = "11" ] || [ "$HOUR_UTC" = "23" ]; then
            MODE="full"
          else
            MODE="incremental"
          fi

          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "Modo: $MODE"

      - name: Executar coletor Bling
        env:
          BLING_CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          BLING_CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          BLING_REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          COLLECT_MODE: ${{ steps.mode.outputs.mode }}
        run: node collect.js

      - name: Atualizar BLING_REFRESH_TOKEN no GitHub Secrets
        if: always() && hashFiles('.bling_refresh_token') != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_TOKEN=$(cat .bling_refresh_token)
          if [ -n "$NEW_TOKEN" ]; then
            echo "$NEW_TOKEN" | gh secret set BLING_REFRESH_TOKEN --repo ${{ github.repository }}
            echo "Token atualizado no Secrets"
          fi
          rm -f .bling_refresh_token

      - name: Commit e push dos dados (com retry e pull)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Tentar até 3 vezes com rebase + pull (trata race conditions com Meta)
          for attempt in 1 2 3; do
            echo "=== Tentativa $attempt ==="

            # Stash de mudanças locais antes do pull
            git add data/bling.json 2>/dev/null || true
            git add data/nfes_cache.json 2>/dev/null || true

            if git diff --staged --quiet; then
              echo "Nenhuma mudanca nos dados Bling"
              exit 0
            fi

            MODE="${{ steps.mode.outputs.mode }}"
            STATUS="${{ job.status }}"
            git commit -m "chore: atualizar dados Bling ($MODE, status=$STATUS) [skip ci]" || echo "Nada a commitar"

            # Pull com rebase pra incorporar mudanças remotas (ex: Meta)
            echo "Puxando mudancas remotas..."
            if git pull --rebase origin main; then
              echo "Pull OK, tentando push..."
              if git push origin main; then
                echo "Push bem-sucedido na tentativa $attempt"
                exit 0
              else
                echo "Push falhou, aguardando antes de retry..."
                sleep 5
              fi
            else
              echo "Pull rebase falhou — resetando e tentando novamente"
              git rebase --abort 2>/dev/null || true
              sleep 5
            fi
          done

          echo "❌ Falha ao commitar/push após 3 tentativas"
          exit 1
