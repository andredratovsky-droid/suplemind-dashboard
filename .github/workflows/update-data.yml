name: Suplemind — Atualizar Dados

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Coletar dados Bling
        env:
          BLING_CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          BLING_CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          BLING_REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
        run: node collect.js

      - name: Atualizar refresh token
        if: always() && hashFiles('.bling_refresh_token') != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_TOKEN=$(cat .bling_refresh_token 2>/dev/null || true)
          if [ -n "$NEW_TOKEN" ]; then
            gh secret set BLING_REFRESH_TOKEN --body "$NEW_TOKEN" --repo "${{ github.repository }}"
            echo "Token atualizado"
          fi

      - name: Commit dados
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Suplemind Bot"
          rm -f .bling_refresh_token
          git add data/
          git diff --staged --quiet || (git commit -m "Dados atualizados $(date -u '+%d/%m/%Y %H:%M') UTC" && git push)
